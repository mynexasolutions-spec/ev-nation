{% extends "storefront/base.html" %}
{% block content %}
<div class="error-page" style="padding: 100px 20px; text-align: center; min-height: 50vh; display: flex; align-items: center; justify-content: center;">
    <div class="container">
        <h1 style="font-size: 4rem; color: var(--color-error); margin-bottom: 20px;">500</h1>
        <h2 style="font-size: 1.5rem; margin-bottom: 10px;">Internal Server Error</h2>
        <p style="color: var(--color-text-muted); margin-bottom: 30px;">Something went wrong on our end. Please try again later.</p>
        <a href="/" class="btn btn-primary">Return Home</a>
    </div>
</div>
{% endblock %}
