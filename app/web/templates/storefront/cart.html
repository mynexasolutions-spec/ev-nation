{% extends "storefront/base.html" %}
{% block content %}

<style>
  nav:not(.scrolled) .nav-logo,
  nav:not(.scrolled) .nav-links a:not(.nav-cta) { color: var(--green-deep) !important; }
  nav:not(.scrolled) .nav-logo img {
    filter: brightness(0) saturate(100%) invert(20%) sepia(45%) saturate(545%) hue-rotate(101deg) brightness(93%) contrast(93%);
  }
  nav:not(.scrolled) .hamburger span { background: var(--green-deep) !important; }

  .cart-page { padding: 140px 56px 100px; background: var(--off-white); min-height: 80vh; }
  .cart-container { max-width: 1100px; margin: 0 auto; }
  .cart-title { font-family: 'Bebas Neue', sans-serif; font-size: 4rem; color: var(--green-deep); margin-bottom: 30px; }

  .cart-layout { display: grid; grid-template-columns: 1fr 380px; gap: 40px; align-items: start; }
  .cart-items-list { display: flex; flex-direction: column; gap: 16px; }
  .cart-item {
    display: grid; grid-template-columns: 100px 1fr auto; gap: 20px; align-items: center;
    background: #fff; padding: 20px; border-radius: 12px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.04); border: 1px solid var(--light-gray);
    transition: box-shadow 0.3s;
  }
  .cart-item:hover { box-shadow: 0 8px 30px rgba(0,0,0,0.08); }
  .cart-item-img { width: 100px; height: 80px; object-fit: contain; border-radius: 8px; }
  .cart-item-name { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; color: var(--green-deep); margin: 0; }
  .cart-item-variant { font-size: 0.85rem; color: var(--gray); margin-top: 2px; }
  .cart-item-price { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 1.2rem; color: var(--charcoal); margin-top: 6px; }

  .cart-qty-controls { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
  .qty-btn {
    width: 32px; height: 32px; border: 1px solid var(--light-gray); border-radius: 6px;
    background: var(--off-white); cursor: pointer; font-size: 1.1rem; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; color: var(--charcoal);
  }
  .qty-btn:hover { background: var(--green-lime); border-color: var(--green-lime); }
  .qty-value { font-weight: 700; font-size: 1rem; min-width: 24px; text-align: center; }

  .cart-item-remove {
    background: none; border: none; cursor: pointer; color: #ccc;
    transition: color 0.2s; padding: 8px;
  }
  .cart-item-remove:hover { color: #e53935; }
  .cart-item-unavailable {
    opacity: 0.5; position: relative;
  }
  .cart-item-unavailable::after {
    content: 'UNAVAILABLE'; position: absolute; top: 10px; right: 10px;
    background: #e53935; color: #fff; font-size: 0.7rem; font-weight: 700;
    padding: 2px 8px; border-radius: 4px;
  }

  /* Summary sidebar */
  .cart-summary {
    background: var(--charcoal); color: #fff; padding: 32px; border-radius: 16px;
    position: sticky; top: 120px;
  }
  .cart-summary h3 { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; color: var(--green-lime); margin-bottom: 20px; }
  .summary-row { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 1rem; }
  .summary-row.total { border-top: 1px solid rgba(255,255,255,0.15); padding-top: 16px; margin-top: 8px; font-size: 1.3rem; font-weight: 700; }
  .summary-row.total span:last-child { color: var(--green-lime); font-family: 'Bebas Neue', sans-serif; font-size: 2rem; }
  .btn-checkout {
    width: 100%; padding: 16px; margin-top: 24px;
    background: var(--green-lime); color: var(--charcoal);
    font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem;
    border: none; border-radius: 8px; cursor: pointer;
    text-transform: uppercase; letter-spacing: 1px;
    transition: transform 0.3s, box-shadow 0.3s;
  }
  .btn-checkout:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(163,255,0,0.3); }
  .btn-checkout:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .btn-continue {
    display: block; text-align: center; margin-top: 16px;
    color: rgba(255,255,255,0.6); font-size: 0.9rem; text-decoration: none;
    transition: color 0.2s;
  }
  .btn-continue:hover { color: #fff; }

  /* Empty cart */
  .cart-empty {
    text-align: center; padding: 80px 20px;
    background: #fff; border-radius: 16px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.04);
  }
  .cart-empty-icon { font-size: 4rem; margin-bottom: 20px; }
  .cart-empty h2 { font-family: 'Bebas Neue', sans-serif; font-size: 2.5rem; color: var(--green-deep); margin-bottom: 10px; }
  .cart-empty p { color: var(--gray); font-size: 1.1rem; margin-bottom: 30px; }

  /* Loading state */
  .cart-loading { text-align: center; padding: 80px 20px; color: var(--gray); }
  .cart-loading .spinner {
    width: 40px; height: 40px; border: 3px solid var(--light-gray);
    border-top-color: var(--green-mid); border-radius: 50%;
    animation: spin 0.8s linear infinite; margin: 0 auto 20px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 768px) {
    .cart-page { padding: 120px 16px 60px; }
    .cart-title { font-size: 3rem; }
    .cart-layout { grid-template-columns: 1fr; }
    .cart-item { grid-template-columns: 80px 1fr auto; gap: 12px; padding: 16px; }
    .cart-item-img { width: 80px; height: 60px; }
    .cart-item-name { font-size: 1.3rem; }
    .cart-summary { position: static; }
  }
</style>

<section class="cart-page">
  <div class="cart-container">
    <h1 class="cart-title">YOUR CART</h1>

    <!-- Loading state -->
    <div class="cart-loading" id="cartLoading">
      <div class="spinner"></div>
      <p>Loading your cart...</p>
    </div>

    <!-- Empty state -->
    <div class="cart-empty" id="cartEmpty" style="display:none;">
      <div class="cart-empty-icon">🛒</div>
      <h2>Your Cart is Empty</h2>
      <p>Looks like you haven't added any electric rides yet.</p>
      <a href="/collection" class="btn-primary" style="display:inline-block; text-decoration:none;">Explore Models</a>
    </div>

    <!-- Cart content -->
    <div class="cart-layout" id="cartContent" style="display:none;">
      <div class="cart-items-list" id="cartItemsList"></div>
      <div class="cart-summary">
        <h3>Order Summary</h3>
        <div class="summary-row">
          <span>Items</span>
          <span id="summaryCount">0</span>
        </div>
        <div class="summary-row total">
          <span>Total</span>
          <span id="summaryTotal">₹0</span>
        </div>
        <button class="btn-checkout" id="checkoutBtn" onclick="goToCheckout()">Proceed to Checkout</button>
        <a href="/collection" class="btn-continue">← Continue Shopping</a>
      </div>
    </div>
  </div>
</section>

<script>
const isLoggedIn = {{ 'true' if user else 'false' }};
let cartData = null;

async function loadCart() {
  const loading = document.getElementById('cartLoading');
  const empty = document.getElementById('cartEmpty');
  const content = document.getElementById('cartContent');

  if (isLoggedIn) {
    // Fetch from API
    try {
      const r = await fetch('/api/v1/cart');
      if (r.ok) {
        cartData = await r.json();
      } else {
        cartData = { items: [], item_count: 0, subtotal: 0 };
      }
    } catch {
      cartData = { items: [], item_count: 0, subtotal: 0 };
    }
  } else {
    // Build from localStorage + fetch product info
    const guest = EVCart.getGuestCart();
    if (guest.length === 0) {
      cartData = { items: [], item_count: 0, subtotal: 0 };
    } else {
      // Fetch product details for guest cart items
      const items = [];
      let subtotal = 0;
      for (const g of guest) {
        try {
          const r = await fetch(`/api/v1/products/id/${g.product_id}`);
          if (r.ok) {
            const p = await r.json();
            const variant = g.variant_id ? (p.variants || []).find(v => v.id === g.variant_id) : null;
            const img = (p.images && p.images.length > 0) ? p.images[0].image_path : null;
            items.push({
              id: `guest_${g.product_id}_${g.variant_id || 0}`,
              product_id: g.product_id,
              variant_id: g.variant_id,
              quantity: g.quantity,
              product_name: p.name,
              product_slug: p.slug,
              variant_name: variant ? variant.color_name : null,
              unit_price: p.base_price,
              image_path: img,
              is_available: true,
              _guest: true,
            });
            subtotal += p.base_price * g.quantity;
          }
        } catch { /* skip */ }
      }
      cartData = { items, item_count: items.length, subtotal };
    }
  }

  loading.style.display = 'none';
  if (cartData.items.length === 0) {
    empty.style.display = 'block';
  } else {
    renderCart();
    content.style.display = 'grid';
  }
}

function formatPrice(paise) {
  return '₹' + Number(paise).toLocaleString('en-IN');
}

function renderCart() {
  const list = document.getElementById('cartItemsList');
  list.innerHTML = '';

  cartData.items.forEach((item, idx) => {
    const div = document.createElement('div');
    div.className = 'cart-item' + (item.is_available ? '' : ' cart-item-unavailable');
    div.innerHTML = `
      <img class="cart-item-img" src="${item.image_path || '/static/images/logo.png'}" alt="${item.product_name}" />
      <div>
        <a href="/bikes/${item.product_slug}" style="text-decoration:none;">
          <h3 class="cart-item-name">${item.product_name}</h3>
        </a>
        ${item.variant_name ? `<p class="cart-item-variant">Color: ${item.variant_name}</p>` : ''}
        ${item.attributes && item.attributes.battery ? `<p class="cart-item-variant">Battery: ${item.attributes.battery}</p>` : ''}
        <p class="cart-item-price">${formatPrice(item.unit_price)}</p>
        <div class="cart-qty-controls">
          <button class="qty-btn" onclick="updateQty(${idx}, -1)" ${item.quantity <= 1 ? 'disabled' : ''}>−</button>
          <span class="qty-value">${item.quantity}</span>
          <button class="qty-btn" onclick="updateQty(${idx}, 1)" ${item.quantity >= 10 ? 'disabled' : ''}>+</button>
        </div>
      </div>
      <button class="cart-item-remove" onclick="removeItem(${idx})" title="Remove">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6"/><path d="M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
      </button>
    `;
    list.appendChild(div);
  });

  updateSummary();
}

function updateSummary() {
  const available = cartData.items.filter(i => i.is_available);
  const count = available.reduce((s, i) => s + i.quantity, 0);
  const total = available.reduce((s, i) => s + i.unit_price * i.quantity, 0);
  document.getElementById('summaryCount').textContent = count;
  document.getElementById('summaryTotal').textContent = formatPrice(total);
  document.getElementById('checkoutBtn').disabled = count === 0;
}

async function updateQty(idx, delta) {
  const item = cartData.items[idx];
  const newQty = item.quantity + delta;
  if (newQty < 1 || newQty > 10) return;

  if (isLoggedIn && !item._guest) {
    try {
      const r = await fetch(`/api/v1/cart/items/${item.id}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ quantity: newQty }),
      });
      if (!r.ok) return;
    } catch { return; }
  } else {
    // Update localStorage
    const guest = EVCart.getGuestCart();
    const gi = guest.findIndex(g => g.product_id === item.product_id && g.variant_id === item.variant_id);
    if (gi >= 0) { guest[gi].quantity = newQty; EVCart.saveGuestCart(guest); }
  }

  item.quantity = newQty;
  renderCart();
  EVCart.updateBadge();
}

async function removeItem(idx) {
  const item = cartData.items[idx];

  if (isLoggedIn && !item._guest) {
    try {
      await fetch(`/api/v1/cart/items/${item.id}`, { method: 'DELETE' });
    } catch { return; }
  } else {
    const guest = EVCart.getGuestCart();
    const updated = guest.filter(g => !(g.product_id === item.product_id && g.variant_id === item.variant_id));
    EVCart.saveGuestCart(updated);
  }

  cartData.items.splice(idx, 1);
  if (cartData.items.length === 0) {
    document.getElementById('cartContent').style.display = 'none';
    document.getElementById('cartEmpty').style.display = 'block';
  } else {
    renderCart();
  }
  EVCart.updateBadge();
}

function goToCheckout() {
  if (!isLoggedIn) {
    window.location.href = '/login?next=/cart';
    return;
  }
  window.location.href = '/checkout';
}

// Load on page ready
document.addEventListener('DOMContentLoaded', loadCart);
</script>

{% endblock %}
