<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page_title or 'EV Nation — Electric Reimagined' }}</title>
  <meta name="description" content="EV Nation – Premium electric scooters built for Indian roads. Zero emissions, maximum performance.">
  <link
    href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;600;700;900&family=Barlow+Condensed:wght@700;900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', path='/storefront.css') }}?v=9">
</head>

<body class="{% if request.url.path != '/' %}inner-page{% endif %}">
  <!-- MOBILE MENU -->
  <div class="mobile-menu" id="mobileMenu">
    <button class="m-close" onclick="closeMenu()">✕</button>
    <a href="/" onclick="closeMenu()">Home</a>
    <a href="/collection" onclick="closeMenu()">Collection</a>
    <a href="/#models" onclick="closeMenu()">Models</a>
    <a href="/#charging" onclick="closeMenu()">Charging</a>
    <a href="/#gallery" onclick="closeMenu()">Gallery</a>
    <a href="/#contact" onclick="closeMenu()">Contact</a>
    <a href="/collection" class="m-cta" onclick="closeMenu()">Explore</a>
  </div>

  <!-- NAV -->
  {% include 'storefront/includes/navbar.html' %}

  {% block content %}{% endblock %}

  <!-- FOOTER -->
  {% include 'storefront/includes/footer.html' %}

  <script>
    // Nav scroll effect
    const navbar = document.getElementById('navbar');
    if (navbar) {
      window.addEventListener('scroll', () => {
        navbar.classList.toggle('scrolled', window.scrollY > 60);
      });
    }

    // Hamburger toggle
    function toggleMenu() {
      const menu = document.getElementById('mobileMenu');
      const burger = document.getElementById('hamburger');
      if (menu && burger) {
        const isOpen = menu.classList.toggle('open');
        burger.classList.toggle('open');
        document.body.style.overflow = isOpen ? 'hidden' : '';
      }
    }
    function closeMenu() {
      const menu = document.getElementById('mobileMenu');
      const burger = document.getElementById('hamburger');
      if (menu && burger) {
        menu.classList.remove('open');
        burger.classList.remove('open');
        document.body.style.overflow = '';
      }
    }

    // Scroll reveal
    const revealEls = document.querySelectorAll('.reveal');
    const revObs = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
    }, { threshold: 0.09 });
    revealEls.forEach(el => revObs.observe(el));

    // Charging bars on scroll
    const chargeObs = new IntersectionObserver(entries => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          e.target.querySelectorAll('.charge-fill').forEach(bar => {
            bar.style.width = bar.dataset.width + '%';
          });
          chargeObs.unobserve(e.target);
        }
      });
    }, { threshold: 0.25 });
    const chargeSec = document.querySelector('.charging-section');
    if (chargeSec) chargeObs.observe(chargeSec);

    // Smooth anchor scrolling
    document.querySelectorAll('a[href^="#"]').forEach(a => {
      a.addEventListener('click', e => {
        const id = a.getAttribute('href');
        const target = id !== '#' && document.querySelector(id);
        if (target) { e.preventDefault(); target.scrollIntoView({ behavior: 'smooth' }); }
      });
    });

    // Hero Slider
    const slider = document.querySelector('.hero-slider');
    const slides = document.querySelectorAll('.hero-slide');
    if (slider && slides.length > 0) {
      let currentSlide = 0;
      function nextSlide() {
        slides[currentSlide].classList.remove('active');
        currentSlide = (currentSlide + 1) % slides.length;
        slides[currentSlide].classList.add('active');
        slider.style.transform = `translateX(-${(currentSlide * 100) / slides.length}%)`;
      }
      setInterval(nextSlide, 3000);
    }
  </script>
</body>
</html>
