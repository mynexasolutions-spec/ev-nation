{% extends 'storefront/base.html' %}

{% block content %}
<style>
  /* Ensure navbar is visible on light bg */
  nav:not(.scrolled) .nav-logo,
  nav:not(.scrolled) .nav-links a:not(.nav-cta) {
    color: var(--green-deep) !important;
  }
  nav:not(.scrolled) .nav-logo img {
    filter: brightness(0) saturate(100%) invert(20%) sepia(45%) saturate(545%) hue-rotate(101deg) brightness(93%) contrast(93%);
  }
  nav:not(.scrolled) .hamburger span {
    background: var(--green-deep) !important;
  }
</style>
<section class="auth-page" style="padding: 140px 20px 100px; background: var(--off-white); min-height: 80vh; display: flex; align-items: center; justify-content: center;">
    <div class="auth-card" style="width: 100%; max-width: 450px; background: var(--white); padding: 50px; border-radius: 12px; box-shadow: 0 20px 60px rgba(0,0,0,0.05); border: 1px solid #eee;">
        <div style="text-align: center; margin-bottom: 40px;">
            <h2 style="font-family: 'Bebas Neue', sans-serif; font-size: 3rem; color: var(--green-deep); margin-bottom: 10px;">JOIN THE NATION</h2>
            <p style="color: var(--gray); font-family: 'Barlow', sans-serif;">Create your EV Nation account</p>
        </div>

        <form id="register-form">
            <div style="margin-bottom: 20px;">
                <label style="display: block; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 0.85rem; text-transform: uppercase; color: var(--green-mid); margin-bottom: 8px;">Full Name</label>
                <input type="text" id="full_name" required style="width: 100%; padding: 15px; border: 1px solid #ddd; border-radius: 4px; font-family: 'Barlow', sans-serif; font-size: 1rem;">
            </div>
            <div style="margin-bottom: 20px;">
                <label style="display: block; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 0.85rem; text-transform: uppercase; color: var(--green-mid); margin-bottom: 8px;">Email Address</label>
                <input type="email" id="email" required style="width: 100%; padding: 15px; border: 1px solid #ddd; border-radius: 4px; font-family: 'Barlow', sans-serif; font-size: 1rem;">
            </div>
            <div style="margin-bottom: 30px;">
                <label style="display: block; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 0.85rem; text-transform: uppercase; color: var(--green-mid); margin-bottom: 8px;">Password</label>
                <input type="password" id="password" required minlength="8" style="width: 100%; padding: 15px; border: 1px solid #ddd; border-radius: 4px; font-family: 'Barlow', sans-serif; font-size: 1rem;">
                <small style="display: block; margin-top: 5px; color: #888; font-size: 0.8rem;">Minimum 8 characters</small>
            </div>

            <div id="auth-feedback" style="display: none; padding: 12px; border-radius: 4px; font-size: 0.95rem; margin-bottom: 20px; text-align: center;"></div>

            <button type="submit" class="btn-primary" style="width: 100%; font-size: 1.1rem; padding: 18px; margin-bottom: 20px;">CREATE ACCOUNT</button>
        </form>

        <div style="text-align: center; font-family: 'Barlow', sans-serif; color: var(--gray);">
            Already have an account? <a href="/login" style="color: var(--green-deep); font-weight: 700; text-decoration: none;">Log in here</a>
        </div>
    </div>
</section>

<script>
    document.getElementById('register-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const fb = document.getElementById('auth-feedback');
        const btn = e.target.querySelector('button[type="submit"]');
        
        btn.disabled = true;
        btn.textContent = 'Creating Account...';
        fb.style.display = 'none';

        try {
            const r = await fetch('/api/v1/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    full_name: document.getElementById('full_name').value.trim(),
                    email: document.getElementById('email').value.trim(),
                    password: document.getElementById('password').value
                })
            });
            const d = await r.json();
            if (!r.ok) {
                let msg = 'Registration failed';
                if (typeof d.detail === 'string') msg = d.detail;
                else if (Array.isArray(d.detail)) msg = d.detail.map(e => e.msg).join(', ');
                else if (d.detail && d.detail.message) msg = d.detail.message;
                throw new Error(msg);
            }

            fb.textContent = '✓ Account created! Redirecting to login...';
            fb.style.background = '#d6f5e3';
            fb.style.color = 'var(--green-deep)';
            fb.style.display = 'block';
            
            setTimeout(() => { window.location.href = '/login'; }, 1500);
        } catch (err) {
            fb.textContent = err.message;
            fb.style.background = '#ffe0e0';
            fb.style.color = '#c00';
            fb.style.display = 'block';
            btn.disabled = false;
            btn.textContent = 'CREATE ACCOUNT';
        }
    });
</script>
{% endblock %}
