{% extends "admin/base.html" %}
{% block content %}
<div style="margin-bottom: 24px; text-align: center;">
    <a href="/" class="muted" style="text-decoration: none; font-weight: 700; font-size: 0.85rem; display: inline-flex; align-items: center; gap: 8px; transition: color 0.2s;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        BACK TO WEBSITE
    </a>
</div>

<section class="auth-card">
    <p class="eyebrow">Internal Access</p>
    <h2>Sign In to EV Nation Admin</h2>
    <p class="muted">Enter your admin credentials to manage the catalog.</p>
    <form id="login-form" class="stack-form">
        <label>
            <span>Email</span>
            <input type="email" name="email" required>
        </label>
        <label>
            <span>Password</span>
            <input type="password" name="password" required>
        </label>
        <button type="submit" class="primary-button">Login</button>
        <p id="login-error" class="error-text" hidden></p>
    </form>
</section>

<script>
const loginForm = document.getElementById("login-form");
const loginError = document.getElementById("login-error");

if (loginForm) {
    loginForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        loginError.hidden = true;

        const formData = new FormData(loginForm);
        const payload = Object.fromEntries(formData.entries());

        try {
            const response = await fetch("/admin/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload),
            });

            const data = await response.json().catch(() => ({ detail: "Login failed." }));
            if (!response.ok) {
                loginError.textContent = data.detail || "Login failed.";
                loginError.hidden = false;
                return;
            }

            window.location.href = data.redirect_url || "/admin/products";
        } catch (err) {
            loginError.textContent = "An error occurred. Please try again.";
            loginError.hidden = false;
        }
    });
}
</script>
{% endblock %}
