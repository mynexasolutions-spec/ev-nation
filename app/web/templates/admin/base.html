<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_title }} | EV Nation Admin</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/admin.css') }}?v=3">
</head>
<body>
    <div class="admin-shell">
        {% if current_admin %}
        <header class="admin-navbar">
            <div class="navbar-inner">
                <div class="navbar-brand">
                    <strong style="margin-right:0.5rem;font-size:1.2rem;">EV Nation <span style="font-weight:400;color:var(--accent);">Admin</span></strong>
                </div>
                <nav class="admin-nav">
                    <a href="/admin/products" class="{% if 'Products' in page_title %}active{% endif %}">Products</a>
                    <a href="/admin/categories" class="{% if 'Categories' in page_title %}active{% endif %}">Categories</a>
                    <a href="/admin/leads" class="{% if 'Leads' in page_title %}active{% endif %}">Leads</a>
                </nav>
                <div class="navbar-user">
                    <span class="muted" style="margin-right: 1rem;">{{ current_admin.full_name or current_admin.email }}</span>
                    <form action="/admin/logout" method="post" style="display:inline">
                        <button type="submit" class="ghost-button small-button">Logout</button>
                    </form>
                </div>
            </div>
        </header>
        {% endif %}
        <main class="admin-main {% if not current_admin %}auth-main{% endif %}">
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
