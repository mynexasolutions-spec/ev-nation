<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_title }} | EV Nation Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', path='/admin.css') }}?v=5">
</head>
<body>
    <div class="admin-shell">
        {% if current_admin %}
        <header class="admin-navbar">
            <div class="navbar-inner">
                <div class="navbar-brand">
                    <strong style="margin-right:0.5rem;font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:0.04em;">EV <span style="color:var(--accent-light);">Nation</span> <span style="font-weight:400;opacity:0.65;font-size:1.1rem;">Admin</span></strong>
                </div>
                <nav class="admin-nav">
                    <a href="/admin/products" class="{% if 'Products' in page_title %}active{% endif %}">Products</a>
                    <a href="/admin/categories" class="{% if 'Categories' in page_title %}active{% endif %}">Categories</a>
                    <a href="/admin/leads" class="{% if 'Leads' in page_title %}active{% endif %}">Leads</a>
                </nav>
                <div class="navbar-user">
                    <span class="muted" style="margin-right: 1rem;">{{ current_admin.full_name or current_admin.email }}</span>
                    <form action="/admin/logout" method="post" style="display:inline">
                        <button type="submit" class="ghost-button small-button">Logout</button>
                    </form>
                </div>
            </div>
        </header>
        {% endif %}
        <main class="admin-main {% if not current_admin %}auth-main{% endif %}">
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
