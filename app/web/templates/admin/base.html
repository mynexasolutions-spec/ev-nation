<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_title }} | EV Nation Admin</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;600;700;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', path='/admin.css') }}?v=5">
</head>

<body>
    <div class="admin-shell">
        {% if current_admin %}
        <header class="admin-navbar">
            <div class="navbar-inner">
                <div class="navbar-brand" style="display: flex; align-items: center; gap: 16px;">
                    <strong style="font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:0.04em;">EV <span
                            style="color:var(--accent-light);">Nation</span> <span
                            style="font-weight:400;opacity:0.65;font-size:1.1rem;">Admin</span></strong>
                    <a href="/" title="View Storefront"
                        style="color: rgba(255,255,255,0.5); display: flex; align-items: center; transition: color 0.2s;"
                        onmouseover="this.style.color='#fff'" onmouseout="this.style.color='rgba(255,255,255,0.5)'">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                            <polyline points="9 22 9 12 15 12 15 22" />
                        </svg>
                    </a>
                </div>
                <nav class="admin-nav">
                    <a href="/admin/products" class="{% if 'Products' in page_title %}active{% endif %}">Products</a>
                    <a href="/admin/categories"
                        class="{% if 'Categories' in page_title %}active{% endif %}">Categories</a>
                    <a href="/admin/orders" class="{% if 'Orders' in page_title %}active{% endif %}">Orders</a>
                    <a href="/admin/leads" class="{% if 'Leads' in page_title %}active{% endif %}">Leads</a>
                    <a href="/admin/users" class="{% if 'Users' in page_title %}active{% endif %}">Users</a>
                    <a href="/admin/blogs" class="{% if 'Blog' in page_title %}active{% endif %}">Blog</a>
                    <a href="/admin/subscribers" class="{% if 'Subscribers' in page_title %}active{% endif %}">Subscribers</a>
                </nav>
                <div class="navbar-user">
                    <form action="/admin/logout" method="post" style="display:inline">
                        <button type="submit" class="ghost-button small-button">Logout</button>
                    </form>
                </div>
            </div>
        </header>
        {% endif %}
        <main class="admin-main {% if not current_admin %}auth-main{% endif %}">
            {% block content %}{% endblock %}
        </main>
    </div>
</body>

</html>
