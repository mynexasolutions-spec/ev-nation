server {
    listen 80;
    server_name evnationsre.com www.evnationsre.com;

    client_max_body_size 20M;

    location /static/ {
        alias /home/ec2-user/ev-nation/app/web/static/;
        expires 30d;
        access_log off;
    }

    location /media/ {
        alias /home/ec2-user/ev-nation/media/;
        expires 30d;
        access_log off;
    }

    location / {
        proxy_pass http://127.0.0.1:8002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
